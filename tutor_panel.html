<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Muro del Tutor - Tuto®ía</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="tutor_panel.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg shadow-sm px-4 fixed-top bg-morado">
  <a class="navbar-brand fw-bold" href="#">
    Tuto<span style="color: var(--morado-suave)">®ía</span>
  </a>
  <span id="saludoTutor" class="text-white fw-light ms-3"></span>

  <div class="ms-auto d-flex align-items-center gap-3">
    <span id="nombreTutorNavbar" class="text-white fw-light me-2"></span>
    <i class="bi bi-bell fs-4 text-white" title="Notificaciones"></i>
    <i class="bi bi-chat-dots fs-4 text-white" title="Mensajes"></i>

    <div class="dropdown">
      <img src="https://via.placeholder.com/40" alt="Perfil" class="rounded-circle" style="width: 40px; height: 40px; cursor: pointer;" data-bs-toggle="dropdown" />
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="#">Mi perfil</a></li>
        <li><a class="dropdown-item" href="#">Configuración</a></li>
        <li><hr class="dropdown-divider" /></li>
        <li><a class="dropdown-item text-danger" href="#" onclick="cerrarSesion()">Cerrar sesión</a></li>
      </ul>
    </div>
  </div>
</nav>


  <!-- Sidebar -->
  <div class="sidebar">
    <a href="#"><i class="bi bi-person-circle me-2"></i> Mi perfil</a>
    <a href="#"><i class="bi bi-chat-left-text me-2"></i> Mensajes</a>
    <a href="#"><i class="bi bi-bell me-2"></i> Notificaciones</a>
    <a href="#"><i class="bi bi-journal-code me-2"></i> Mis tutorías</a>
    <a href="#"><i class="bi bi-gear me-2"></i> Configuración</a>
  </div>

  <!-- Contenido principal -->
  <div class="content">
    <h1 class="text-center mb-4">Muro del Tutor</h1>

    <!-- Botón para publicar nueva tutoría -->
    <div class="text-end mb-3">
      <button class="btn btn-morado" onclick="abrirModalTutoria()">+ Nueva tutoría</button>
    </div>

    <!-- Contenedor del muro -->
    <div id="muroTutorias">
      <!-- Publicaciones se insertan dinámicamente con JS -->
    </div>
  </div>

<!-- Modal para crear/editar tutoría -->
<div class="modal fade" id="modalTutoria" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="formTutoria">
        <div class="modal-header bg-morado text-white">
          <h5 class="modal-title">Publicar tutoría</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="idTutoria" />
          
          <input type="text" id="titulo" class="form-control mb-3" placeholder="Título" required />
          <textarea id="descripcion" class="form-control mb-3" rows="3" placeholder="Descripción" required></textarea>
          <input type="number" id="precio" class="form-control mb-3" placeholder="Precio (AR$)" min="0" step="0.01" required />

          <!-- Campo de referencias -->
          <div class="mb-3">
            <label for="referencias" class="form-label">Referencias (temas clave)</label>
            <input type="text" class="form-control mb-2" id="ref1" placeholder="Ej: PHP" />
            <input type="text" class="form-control mb-2" id="ref2" placeholder="Ej: Frontend" />
            <input type="text" class="form-control mb-2" id="ref3" placeholder="Ej: Programación Web" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-morado w-100">Publicar</button>
        </div>
      </form>
    </div>
  </div>
</div>


  <!-- Scripts -->
  <script src="tutor_panel.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
