<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat - Tuto®ía</title>
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light">

  <div class="container py-4">
    <h2 class="mb-4">💬 Chat entre estudiante y tutor</h2>

    <div id="chatBox" class="border rounded p-3 mb-3 bg-white" style="height:400px; overflow-y:auto;">
      <p class="text-muted">Cargando mensajes...</p>
    </div>

    <div class="input-group">
      <input type="text" id="mensaje" class="form-control" placeholder="Escribe tu mensaje..." />
      <button class="btn btn-primary" id="enviarBtn">Enviar</button>
    </div>
  </div>

  <script src="/chat/chat.js"></script>
</body>
</html>
