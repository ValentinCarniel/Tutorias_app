<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chats - TutorMatch</title>
  <link rel="stylesheet" href="/chat/chat.css">
  <link rel="stylesheet" href="/Tutorias.css">

</head>
<body>
  <div class="inbox-container">
    <h2>Bandeja de Mensajes</h2>

    <div class="chat-item" onclick="window.location.href='chat.html'">
      <div class="chat-info">
        <strong>Agustina López</strong>
        <span class="chat-preview">Hola, ¿en qué te puedo ayudar?</span>
      </div>
      <div class="chat-time">Hace 2 min</div>
    </div>

    <div class="chat-item" onclick="window.location.href='chat.html'">
      <div class="chat-info">
        <strong>Juan Pérez</strong>
        <span class="chat-preview">¿Podrías explicarme diccionarios en Python?</span>
      </div>
      <div class="chat-time">Hace 1 h</div>
    </div>

    <div class="chat-item" onclick="window.location.href='chat.html'">
      <div class="chat-info">
        <strong>Camila Soto</strong>
        <span class="chat-preview">Tengo disponibles los martes por la tarde :)</span>
      </div>
      <div class="chat-time">Ayer</div>
    </div>
  </div>
</body>
</html>
