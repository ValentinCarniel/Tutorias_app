<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfil del Tutor</title>
  <link rel="stylesheet" href="../assets/css/perfil_tutor.css" />
</head>
<body>
  <div class="perfil-container">
    <div class="foto">
      <img src="../assets/img/default-avatar.png" alt="Foto de tutor" id="fotoTutor" />
    </div>

    <h2 id="nombreTutor">María González</h2>

    <div class="materias">
      <h4>Materias que enseña</h4>
      <ul id="listaMaterias">
        <li>Matemática</li>
        <li>Física</li>
        <li>Programación</li>
      </ul>
    </div>

    <div class="descripcion">
      <h4>Sobre mí</h4>
      <p id="descTutor">
        Soy estudiante avanzada de ingeniería y me encanta enseñar. Tengo experiencia dando clases particulares online y presenciales.
      </p>
    </div>

    <div class="acciones">
      <a href="chat/chat.html?usuario=maria" class="btn btn-morado">Enviar mensaje</a>
    </div>
  </div>
</body>
</html>
